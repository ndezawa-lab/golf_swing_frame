<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Hash Generator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #eef3ef;
      color: #152018;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d8e2d8;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 16px 34px rgba(18, 33, 22, 0.08);
    }
    h1 { margin-top: 0; font-size: 24px; }
    label { display: grid; gap: 8px; font-weight: 800; }
    input, textarea {
      width: 100%;
      border: 1px solid #d8e2d8;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
    }
    textarea { min-height: 120px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    button {
      margin-top: 12px;
      border: 0;
      border-radius: 999px;
      background: #1f7a41;
      color: #fff;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 15px;
    }
    p { color: #5f6d63; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <h1>パスワードハッシュ生成</h1>
    <p>公開前に任意のパスワードを入力し、生成された値を <code>config.js</code> の <code>PASSWORD_HASH</code> に貼り替えてください。</p>
    <label>
      新しいパスワード
      <input id="password" type="password" autocomplete="new-password" />
    </label>
    <button id="generate" type="button">ハッシュを生成</button>
    <p>生成結果</p>
    <textarea id="result" readonly></textarea>
  </main>
  <script>
    async function sha256Hex(text) {
      const encoded = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", encoded);
      return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
    }
    document.getElementById("generate").addEventListener("click", async () => {
      const password = document.getElementById("password").value;
      if (!password) {
        document.getElementById("result").value = "パスワードを入力してください。";
        return;
      }
      const hash = await sha256Hex(password);
      document.getElementById("result").value = hash;
    });
  </script>
</body>
</html>
